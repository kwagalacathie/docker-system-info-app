apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-system-info
spec:
  replicas: 1
  selector:
    matchLabels:
      app: system-info
  template:
    metadata:
      labels:
        app: system-info
    spec:
      containers:
      - name: flask-app
        image: your-dockerhub-username/docker-system-info-app:latest # Update this
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort
  selector:
    app: system-info
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30005 # Accessible via EC2-IP:30005